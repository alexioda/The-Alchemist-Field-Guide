<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Alchemist Field Guide | LiveAdaptiv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #b2945e;
      --gold-light: #d4b483;
      --stone: #fafaf9;
      --charcoal: #1c1917;
    }

    body {
      background-color: var(--stone);
      color: var(--charcoal);
      font-family: 'Inter', sans-serif;
      overscroll-behavior: none;
    }

    .font-serif { font-family: 'Cormorant Garamond', serif; }

    .blueprint-dot {
      background-image: radial-gradient(circle at 1px 1px, #e7e5e4 1px, transparent 0);
      background-size: 30px 30px;
    }

    /* ── LOCK SCREEN ─────────────────────────────────────────────── */
    #lock-screen {
      position: fixed; inset: 0;
      background: #020617;
      display: flex; align-items: center; justify-content: center;
      z-index: 999999;
      transition: opacity 0.5s ease;
    }

    .lock-container {
      background: #0f172a;
      border: 1px solid #1e293b;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    .lock-input {
      width: 100%; padding: 14px;
      background: #020617;
      border: 1px solid #334155;
      color: white;
      border-radius: 8px;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 3px;
      font-family: monospace;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .lock-input:focus { border-color: var(--gold); }

    .lock-btn {
      width: 100%;
      background: var(--gold);
      color: #020617;
      font-weight: bold;
      border: none;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      transition: all 0.2s;
    }
    .lock-btn:hover { background: var(--gold-light); }
    .lock-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── ANIMATIONS ──────────────────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    .animate-fade-in-up  { animation: fadeInUp 0.8s ease forwards; }
    .animate-slide-right { animation: slideInRight 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
    .animate-shake       { animation: shake 0.4s ease; }

    /* ── RANGE SLIDER ────────────────────────────────────────────── */
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 24px; width: 24px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      margin-top: -10px;
      box-shadow: 0 0 10px rgba(178,148,94,0.5);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%; height: 4px;
      background: #e7e5e4;
      border-radius: 2px;
    }
    input[type=range]:focus { outline: none; }

    /* ── SCROLLBAR ───────────────────────────────────────────────── */
    .journal-input::-webkit-scrollbar { width: 4px; }
    .journal-input::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }

    /* ── VALIDATION ERROR ────────────────────────────────────────── */
    .field-error {
      color: #e11d48;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 6px;
      display: none;
    }
    .field-error.visible { display: block; }

    .input-invalid { border-color: #e11d48 !important; }

    /* ── SAVE INDICATOR ──────────────────────────────────────────── */
    #save-indicator {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--charcoal);
      color: white;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 100px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #save-indicator.visible { opacity: 1; }

    #main-app { display: none; }
    #main-app.visible { display: flex; }
  </style>
</head>
<body class="blueprint-dot">

<div id="lock-screen">
  <div class="lock-container">
    <div class="font-serif italic text-4xl mb-4" style="color:var(--gold)">A</div>
    <div class="text-white text-lg font-semibold mb-2">The Field Guide</div>
    <div class="text-slate-400 text-xs mb-6 leading-relaxed">
      Secured Clinical Protocol.<br>Enter your access cipher.
    </div>
    <input
      type="password"
      id="cipher-input"
      class="lock-input"
      placeholder="ENTER CIPHER"
      autocomplete="off"
      spellcheck="false"
    >
    <div id="lock-error" class="text-rose-500 text-xs font-bold tracking-wider mb-3" style="display:none">
      INVALID CIPHER. ACCESS DENIED.
    </div>
    <button id="auth-btn" onclick="authenticate()" class="lock-btn">
      Authenticate
    </button>
    <div id="auth-loading" class="text-slate-500 text-xs mt-3" style="display:none">
      Verifying...
    </div>
  </div>
</div>

<div id="main-app" class="min-h-screen flex-col">

  <nav class="p-5 flex justify-between items-center sticky top-0 z-50 bg-stone-50/90 backdrop-blur-md border-b border-stone-200">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 border border-[#b2945e]/40 rounded-full flex items-center justify-center">
        <span class="font-serif italic text-lg text-[#b2945e] pb-0.5">A</span>
      </div>
      <span class="text-[9px] font-bold uppercase tracking-[0.4em] text-stone-400">LiveAdaptiv</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-[9px] font-bold uppercase tracking-widest text-[#b2945e]">The Alchemist Protocol</div>
      <button onclick="confirmReset()" title="Start new session" class="text-stone-300 hover:text-stone-600 transition-colors">
        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
      </button>
    </div>
  </nav>

  <main class="flex-1 max-w-3xl mx-auto w-full p-6 pb-32">

    <div id="step-content"></div>

    <div id="validation-banner" class="mt-6 p-4 bg-rose-50 border border-rose-200 rounded-xl text-rose-700 text-sm font-medium" style="display:none">
      <span id="validation-message"></span>
    </div>

    <div class="mt-12 pt-8 border-t border-stone-200 flex items-center justify-between">
      <button
        id="prev-btn"
        onclick="prevStep()"
        class="text-stone-400 hover:text-stone-900 font-serif italic text-lg transition-colors flex items-center gap-2 cursor-pointer disabled:opacity-0 disabled:pointer-events-none"
      >← Previous</button>

      <div class="h-1 flex-1 mx-4 bg-stone-200 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-[#b2945e] transition-all duration-500 shadow-[0_0_10px_rgba(178,148,94,0.5)]" style="width:0%"></div>
      </div>

      <button
        id="next-btn"
        onclick="nextStep()"
        class="bg-stone-900 text-stone-50 px-8 py-3 rounded-full hover:bg-[#b2945e] hover:text-white transition-all font-sans text-xs font-bold tracking-[0.2em] uppercase shadow-lg transform hover:-translate-y-0.5"
      >Next →</button>
    </div>
  </main>
</div>

<div id="save-indicator">Session saved</div>

<script>
lucide.createIcons();

// ════════════════════════════════════════════════════════════════════
// CONTENT DATA — all text lives here, separate from render logic
// Edit cycle titles, prompts, and placeholder text without touching
// render functions.
// ════════════════════════════════════════════════════════════════════

const CYCLES = [

    id: 'cycle1',
    type: 'anchor',

  },

    requiredMessage: 'Locate the physical friction before moving forward. Even one sentence.'
  },
  {
    id: 'cycle3',
    type: 'mind',
    number: '03',
    title: 'The Mind',
    loopLabel: 'The Loop (Fiction)',
    factLabel: 'The Fact (Data)',
    factPlaceholder: 'The absolute objective truth is...',
    required: ['thought', 'reframe'],

  {
    id: 'cycle4',
    type: 'pivot',
    number: '04',

    lead: 'The Pivot is the exact moment you stop managing the symptom and address the root cause. You have identified the physical sensation and the mental loop. Now, we challenge the foundation.',
    fearLabel: 'What is the core fear or assumption driving this friction?',

  },
  {

    number: '05',
    title: 'The Void',
    lead: 'Action without integration is just more noise. You have identified the friction and decided on a pivot. Now, you must stop. For the next 60 seconds, do absolutely nothing. Your nervous system needs this pause to metabolize the cortisol and write the new neural pathway. Do not force an answer. Just observe what surfaces.',
    label: 'In the stillness, what became clear?',
    required: ['stillness'],
    requiredMessage: 'Sit with the silence and write what surfaced — even a fragment.'
  },
  {
    id: 'cycle6',
    type: 'output',
    number: '06',
    title: 'The Output',
    shadowTitle: 'The Golden Shadow',
    shadowDesc: 'The Saboteur holds your fears. The Golden Shadow holds your unlived greatness. The traits you admire in others are merely your own latent potential waiting to be claimed.',
    shadowLabel: 'Who is your hero, and what trait do they have that you "lack"?',
    shadowPlaceholder: 'I admire [Name] because they are [Trait]. This trait lives in me as...',
    contractLabel: 'The Contract',
    required: ['action', 'commitment'],
    requiredMessage: 'Complete the Contract — the commitment is the entire point of this cycle.'
  },
  {
    id: 'cycle7',
    type: 'pattern',
    number: '07',
    title: 'Pattern Rec',
    lead: 'You have shifted your baseline. Let\'s quantify the alchemy.',
    sliderLabel: 'Post-Protocol Audit',
    sliderSub: 'Re-evaluate your friction state',
    blueprintTitle: 'Your Execution Blueprint',
  }
];

// Archetype-specific prompts — data, not logic
const ARCHETYPE_PROMPTS = {
  'The Rusher':  'The Rusher says: "There isn\'t enough time." I keep thinking that...',
  'The Freezer': 'The Freezer says: "I can\'t handle this." I keep thinking that...',
  'The Fixer':   'The Fixer says: "It\'s all on me." I keep thinking that...',
  default:       'I keep thinking that...'
};

// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'la_field_guide_v1';

const DEFAULT_STATE = {
  currentStep: 0,
  entries: {
    cycle1: { archetype: '', pre_friction: 5 },
    cycle2: { sensation: '' },
    cycle3: { thought: '', reframe: '' },
    cycle4: { core_fear: '', sovereign_pivot: '' },
    cycle5: { stillness: '' },
    cycle6: { action: '', commitment: '', golden_shadow: '' },
    cycle7: { post_friction: 5 }
  }
};

let appState = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {
    console.warn('Could not load saved session:', e);
  }
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

let saveTimer = null;

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    showSaveIndicator();
  } catch (e) {
    console.warn('Could not save session:', e);
  }
}

function saveEntry(cycle, field, value) {
  appState.entries[cycle][field] = value;
  // Debounce saves — write 800ms after last keystroke
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 800);
}

function showSaveIndicator() {
  const el = document.getElementById('save-indicator');
  el.classList.add('visible');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('visible'), 1500);
}

function confirmReset() {
  if (confirm('Start a new session? Your current session will be cleared.')) {
    localStorage.removeItem(STORAGE_KEY);
    appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
    renderStep();
  }
}

// ════════════════════════════════════════════════════════════════════
// AUTHENTICATION — calls serverless function, cipher never in client
// ════════════════════════════════════════════════════════════════════

async function authenticate() {
  const input   = document.getElementById('cipher-input').value.trim();
  const btn     = document.getElementById('auth-btn');
  const loading = document.getElementById('auth-loading');
  const error   = document.getElementById('lock-error');

  if (!input) return;

  btn.disabled = true;
  loading.style.display = 'block';
  error.style.display   = 'none';

  try {
    const res = await fetch('/api/authenticate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cipher: input })
    });

    const data = await res.json();

    if (data.success) {
      // Store token for this browser session
      sessionStorage.setItem('la_auth_token', data.token);
      unlockApp();
    } else {
      showAuthError();
    }
  } catch (e) {
    // Network error or local dev without serverless — fallback for dev
    console.warn('Auth endpoint unavailable. Dev fallback active.');
    if (input.toUpperCase() === 'DEVMODE') {
      unlockApp();
    } else {
      showAuthError();
    }
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function showAuthError() {
  const error  = document.getElementById('lock-error');
  const input  = document.getElementById('cipher-input');
  error.style.display = 'block';
  input.value = '';
  input.classList.add('animate-shake');
  setTimeout(() => input.classList.remove('animate-shake'), 400);
  input.focus();
}

function unlockApp() {
  const lock = document.getElementById('lock-screen');
  lock.style.opacity = '0';
  setTimeout(() => {
    lock.style.display = 'none';
    const app = document.getElementById('main-app');
    app.classList.add('visible', 'animate-fade-in-up');
    renderStep();
  }, 500);
}

document.getElementById('cipher-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') authenticate();
});

// ════════════════════════════════════════════════════════════════════
// VALIDATION
// ════════════════════════════════════════════════════════════════════

function validateStep() {
  const cycle = CYCLES[appState.currentStep];
  if (!cycle.required) return true;

  const e = appState.entries;
  let valid = true;

  for (const field of cycle.required) {
    let value = '';

    // Map field to the right cycle's entries
    if (cycle.id === 'cycle1') value = e.cycle1[field] || '';
    else if (cycle.id === 'cycle2') value = e.cycle2[field] || '';
    else if (cycle.id === 'cycle3') value = e.cycle3[field] || '';
    else if (cycle.id === 'cycle4') value = e.cycle4[field] || '';
    else if (cycle.id === 'cycle5') value = e.cycle5[field] || '';
    else if (cycle.id === 'cycle6') value = e.cycle6[field] || '';

    if (!value.trim()) {
      valid = false;
      break;
    }
  }

  if (!valid) {
    const banner = document.getElementById('validation-banner');
    const msg    = document.getElementById('validation-message');
    msg.textContent = cycle.requiredMessage;
    banner.style.display = 'block';
    banner.classList.add('animate-shake');
    setTimeout(() => banner.classList.remove('animate-shake'), 400);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  } else {
    document.getElementById('validation-banner').style.display = 'none';
  }

  return valid;
}

// ════════════════════════════════════════════════════════════════════
// RENDER FUNCTIONS — pure templates, read from CYCLES data
// ════════════════════════════════════════════════════════════════════

const renderers = {

  intro(cycle) {
    return `
      <div class="text-center space-y-8 mt-12 animate-fade-in-up">
        <span class="text-xs font-bold tracking-[0.3em] uppercase text-[#b2945e] border border-[#b2945e] px-3 py-1 rounded-full">
          ${cycle.subtitle}
        </span>
        <h2 class="text-4xl md:text-6xl font-serif italic text-stone-900 leading-none">
          ${cycle.title}
        </h2>
        <div class="w-16 h-1 bg-[#b2945e] mx-auto"></div>
        <p class="text-lg text-stone-600 font-serif leading-relaxed max-w-xl mx-auto">
          ${cycle.body}
        </p>
        <div class="grid md:grid-cols-3 gap-4 text-left mt-12">
          ${cycle.cards.map(card => `
            <div class="p-6 bg-white border border-stone-200 rounded-xl shadow-sm">
              <div class="text-2xl mb-2">${card.icon}</div>
              <h3 class="font-bold text-xs uppercase tracking-widest mb-2">${card.heading}</h3>
              <p class="text-sm text-stone-500">${card.text}</p>
            </div>
          `).join('')}
        </div>
      </div>`;
  },

  anchor(cycle) {
    const arch   = appState.entries.cycle1.archetype;
    const preVal = appState.entries.cycle1.pre_friction;
    return `
      <div class="space-y-8 mt-6">
        ${cycleHeader(cycle)}
        <p class="font-serif text-xl text-stone-700 leading-relaxed">${cycle.lead}</p>

        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm">
          <div class="flex justify-between items-end mb-4">
            <div>
              <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-stone-900">${cycle.sliderLabel}</h3>
              <p class="text-[10px] text-stone-500 uppercase tracking-widest mt-1">${cycle.sliderSub}</p>
            </div>
            <div class="text-3xl font-serif italic text-[#b2945e]" id="pre-val-display">${preVal}</div>
          </div>
          <input type="range" min="1" max="10" value="${preVal}"
            oninput="updateSlider(this, 'pre-val-display', 'cycle1', 'pre_friction')">
          <div class="flex justify-between text-[10px] uppercase font-bold text-stone-400 mt-2">
            <span>1 (Flow)</span><span>10 (Overload)</span>
          </div>
        </div>

        <div class="bg-stone-50 p-6 rounded-xl border border-stone-200">
          <p class="text-xs font-bold uppercase tracking-widest text-stone-500 mb-4">
            Select Your Archetype (Required)
          </p>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            ${cycle.archetypes.map(a => `
              <button onclick="setArchetype('${a.name}')"
                class="p-4 bg-white border rounded-lg transition-all text-left
                  ${arch === a.name
                    ? 'border-[#b2945e] bg-[#b2945e]/10 ring-1 ring-[#b2945e]'
                    : 'border-stone-200 hover:border-stone-400'}">
                <span class="block font-bold text-stone-900 mb-1">${a.name}</span>
                <span class="text-xs text-stone-500">${a.desc}</span>
              </button>
            `).join('')}
          </div>
        </div>
      </div>`;
  },

  somatic(cycle) {
    return `
      <div class="space-y-8 mt-6">
        ${cycleHeader(cycle)}
        <p class="font-serif text-xl text-stone-700 leading-relaxed">${cycle.lead}</p>
        <div>
          <label class="font-sans text-xs font-bold uppercase tracking-widest text-stone-400 block mb-2">
            ${cycle.fieldLabel}
          </label>
          <textarea
            oninput="saveEntry('cycle2', 'sensation', this.value)"
            class="w-full bg-stone-50 border border-stone-200 rounded-lg p-4
              focus:border-[#b2945e] outline-none h-32 resize-none
              text-stone-700 font-serif italic text-lg journal-input"
            placeholder="${cycle.placeholder}"
          >${appState.entries.cycle2.sensation}</textarea>
        </div>
      </div>`;
  },

  mind(cycle) {
    const arch   = appState.entries.cycle1.archetype;
    const prompt = ARCHETYPE_PROMPTS[arch] || ARCHETYPE_PROMPTS.default;
    return `
      <div class="space-y-8 mt-6">
        ${cycleHeader(cycle)}
        <div class="grid md:grid-cols-2 gap-8">
          <div class="p-6 border border-stone-200 rounded-xl bg-stone-50">
            <label class="font-sans text-xs font-bold uppercase tracking-widest text-stone-400 block mb-2">
              ${cycle.loopLabel}
            </label>
            <p class="text-xs text-[#b2945e] mb-2 font-bold uppercase tracking-widest">
              Archetype: ${arch || 'None Selected'}
            </p>
            <textarea
              oninput="saveEntry('cycle3', 'thought', this.value)"
              class="w-full bg-transparent border-b border-stone-200 focus:border-stone-900
                outline-none h-32 resize-none text-stone-600 font-serif text-lg italic mt-2 journal-input"
              placeholder="${prompt}"
            >${appState.entries.cycle3.thought}</textarea>
          </div>
          <div class="p-6 bg-stone-900 rounded-xl text-stone-300">
            <label class="font-sans text-xs font-bold uppercase tracking-widest text-[#b2945e] block">

            </label>
            <textarea
              oninput="saveEntry('cycle3', 'reframe', this.value)"
              class="w-full bg-transparent border-b border-stone-700 focus:border-[#b2945e]
                outline-none h-32 resize-none text-white font-serif text-lg mt-2 journal-input"

        </div>

  },

  pivot(cycle) {
    return `
      <div class="space-y-8 mt-6">

        <p class="font-serif text-lg text-stone-600 leading-relaxed">${cycle.lead}</p>

          <div class="p-4 bg-stone-100 rounded-lg italic text-stone-600">
            <input type="text"
              oninput="saveEntry('cycle4', 'core_fear', this.value)"
              value="${escHtml(appState.entries.cycle4.core_fear)}"
              class="bg-transparent w-full outline-none"
              placeholder="${cycle.fearPlaceholder}">
          </div>
        </div>
        <div>
          <label class="font-serif text-xl text-stone-800 block mb-1">${cycle.pivotLabel}</label>
          <p class="text-xs uppercase tracking-widest text-stone-400 font-bold mb-3">${cycle.pivotSub}</p>
          <textarea
            oninput="saveEntry('cycle4', 'sovereign_pivot', this.value)"
            class="w-full bg-transparent border-b border-stone-300 focus:border-[#b2945e]
              focus:outline-none min-h-[80px] journal-input resize-none
              text-stone-700 font-serif text-lg italic"
            placeholder="${cycle.pivotPlaceholder}"
          >${appState.entries.cycle4.sovereign_pivot}</textarea>
        </div>
      </div>`;
  },

  void(cycle) {
    return `
      <div class="space-y-8 mt-6">
        ${cycleHeader(cycle)}
        <p class="font-serif text-xl text-stone-700 leading-relaxed">${cycle.lead}</p>
        <div class="flex justify-center py-8">
          <div class="w-32 h-32 rounded-full border-2 border-stone-200 flex items-center justify-center animate-pulse">
            <div class="w-24 h-24 rounded-full bg-stone-100 flex items-center justify-center">
              <span class="font-serif italic text-stone-400">Stillness</span>
            </div>
          </div>
        </div>
        <div>
          <label class="font-serif text-xl text-stone-800 block mb-2">${cycle.label}</label>
          <textarea
            oninput="saveEntry('cycle5', 'stillness', this.value)"
            class="w-full bg-transparent border-b border-stone-300 focus:border-[#b2945e]
              focus:outline-none min-h-[100px] journal-input resize-none
              text-stone-700 font-serif text-lg italic"
            placeholder="..."
          >${appState.entries.cycle5.stillness}</textarea>
        </div>
      </div>`;
  },

  output(cycle) {
    return `
      <div class="space-y-12 mt-6">
        ${cycleHeader(cycle)}

        <div class="bg-stone-900 text-stone-200 p-8 rounded-xl border border-stone-800 relative overflow-hidden">
          <div class="absolute -top-10 -right-10 w-40 h-40 bg-[#b2945e] rounded-full blur-[60px] opacity-20"></div>
          <h3 class="font-serif text-2xl text-white italic mb-2 relative z-10">${cycle.shadowTitle}</h3>
          <p class="text-sm text-stone-400 mb-6 relative z-10 max-w-lg">${cycle.shadowDesc}</p>
          <label class="text-xs font-bold uppercase tracking-widest text-[#b2945e] block mb-2 relative z-10">
            ${cycle.shadowLabel}
          </label>
          <textarea
            oninput="saveEntry('cycle6', 'golden_shadow', this.value)"
            class="w-full bg-stone-800/50 border-b border-stone-600 text-white
              font-serif text-lg italic p-2 focus:outline-none focus:border-[#b2945e]
              rounded relative z-10 journal-input"
            placeholder="${cycle.shadowPlaceholder}"
          >${appState.entries.cycle6.golden_shadow}</textarea>
        </div>

        <div class="bg-[#b2945e]/10 border border-[#b2945e]/30 p-8 rounded-xl">
          <label class="font-sans text-xs font-bold uppercase tracking-widest text-stone-800 block mb-4">
            ${cycle.contractLabel}
          </label>
          <div class="space-y-6">
            <div>
              <span class="font-serif text-2xl text-stone-800">I solemnly commit to</span>
              <input type="text"
                oninput="saveEntry('cycle6', 'action', this.value)"
                value="${escHtml(appState.entries.cycle6.action)}"
                class="bg-transparent border-b-2 border-stone-800 w-full font-serif text-2xl
                  text-stone-900 focus:outline-none focus:border-[#b2945e] p-1 mt-2"
                placeholder="take this action...">
            </div>
            <div>
              <span class="font-serif text-2xl text-stone-800">by</span>
              <input type="text"
                oninput="saveEntry('cycle6', 'commitment', this.value)"
                value="${escHtml(appState.entries.cycle6.commitment)}"
                class="bg-transparent border-b-2 border-stone-800 w-full font-serif text-2xl
                  text-stone-900 focus:outline-none focus:border-[#b2945e] p-1 mt-2"
                placeholder="tomorrow at...">
            </div>
          </div>
        </div>
      </div>`;
  },

  pattern(cycle) {
    const e       = appState.entries;
    const postVal = e.cycle7.post_friction;
    return `
      <div class="space-y-8 mt-6">
        ${cycleHeader(cycle)}
        <p class="font-serif text-xl text-stone-700 leading-relaxed">${cycle.lead}</p>

        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm mb-8">
          <div class="flex justify-between items-end mb-4">
            <div>
              <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-stone-900">
                ${cycle.sliderLabel}
              </h3>
              <p class="text-[10px] text-stone-500 uppercase tracking-widest mt-1">${cycle.sliderSub}</p>
            </div>
            <div class="text-3xl font-serif italic text-[#b2945e]" id="post-val-display">${postVal}</div>
          </div>
          <input type="range" min="1" max="10" value="${postVal}" class="mb-6"
            oninput="updateSlider(this, 'post-val-display', 'cycle7', 'post_friction'); calculateDelta()">
          <div class="pt-4 border-t border-stone-100 flex justify-between items-center">
            <span class="text-[10px] uppercase font-bold text-stone-400 tracking-widest">
              Entry Baseline: ${e.cycle1.pre_friction}
            </span>
            <div id="delta-display" class="text-sm font-sans uppercase tracking-widest"></div>
          </div>
        </div>

        <div class="bg-stone-900 text-stone-50 p-8 rounded-2xl shadow-2xl relative overflow-hidden">
          <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-6">
            ${cycle.blueprintTitle}
          </h3>
          <div class="space-y-4 font-serif text-lg">
            <p>
              <strong class="font-sans text-xs uppercase tracking-widest text-stone-500 mr-2">Archetype:</strong>
              ${escHtml(e.cycle1.archetype) || '<span class="italic text-stone-500">None selected</span>'}
            </p>
            <p>
              <strong class="font-sans text-xs uppercase tracking-widest text-stone-500 mr-2">Core Fear:</strong>
              ${escHtml(e.cycle4.core_fear) || '<span class="italic text-stone-500">Unanswered</span>'}
            </p>
            <p>
              <strong class="font-sans text-xs uppercase tracking-widest text-stone-500 mr-2">The Pivot:</strong>
              ${escHtml(e.cycle4.sovereign_pivot) || '<span class="italic text-stone-500">Unanswered</span>'}
            </p>
            <p class="font-sans text-xs uppercase tracking-widest text-[#b2945e] mt-6 mb-2 block">
              Final Directive:
            </p>
            <p class="italic text-white bg-stone-800 p-4 rounded-lg">
              "I commit to ${escHtml(e.cycle6.action) || '___'} by ${escHtml(e.cycle6.commitment) || '___'}."
            </p>
          </div>
        </div>
      </div>`;
  }
};

// ════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════

function cycleHeader(cycle) {
  return `
    <div class="border-b border-stone-300 pb-4">
      <h2 class="text-5xl font-serif italic text-stone-900">${cycle.title}</h2>
      <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e]">Cycle ${cycle.number}</span>
    </div>`;
}

// Escape user content before injecting into HTML to prevent XSS
function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function updateSlider(el, displayId, cycle, field) {
  document.getElementById(displayId).innerText = el.value;
  saveEntry(cycle, field, parseInt(el.value));
}

function setArchetype(name) {
  appState.entries.cycle1.archetype = name;
  saveState();
  renderStep();
}

function calculateDelta() {
  const pre     = appState.entries.cycle1.pre_friction;
  const post    = appState.entries.cycle7.post_friction;
  const delta   = post - pre;
  const display = document.getElementById('delta-display');
  if (!display) return;

  if (delta < 0) {
    display.innerHTML = `<span class="text-green-500 font-bold">${delta} Points Metabolized</span>`;
  } else if (delta === 0) {
    display.innerHTML = `<span class="text-stone-500 font-bold">Baseline Maintained</span>`;
  } else {
    display.innerHTML = `<span class="text-red-500 font-bold">+${delta} Friction Increased</span>`;
  }
}

// ════════════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════════════

function renderStep() {
  const cycle      = CYCLES[appState.currentStep];
  const renderer   = renderers[cycle.type];
  const contentDiv = document.getElementById('step-content');

  // Clear animation class, force reflow via class toggle (not void hack)
  contentDiv.classList.remove('animate-slide-right');
  requestAnimationFrame(() => {
    contentDiv.innerHTML = renderer(cycle);
    contentDiv.classList.add('animate-slide-right');
  });

  // Hide validation banner on step change
  document.getElementById('validation-banner').style.display = 'none';

  // Progress bar — excludes intro from count so cycle 1 = first real step
  const total   = CYCLES.length - 1;
  const current = appState.currentStep;
  const pct     = current === 0 ? 0 : Math.round((current / total) * 100);
  document.getElementById('progress-bar').style.width = `${pct}%`;

  // Buttons
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  prevBtn.disabled = appState.currentStep === 0;

  const isLast = appState.currentStep === CYCLES.length - 1;
  nextBtn.innerHTML  = isLast ? 'Return to Hub' : 'Next →';
  nextBtn.disabled   = false;

  // Save step position
  appState.currentStep = appState.currentStep; // already set
  saveState();

  // Recalculate delta if on final step
  if (isLast) calculateDelta();

  lucide.createIcons();
}

function nextStep() {
  if (appState.currentStep === CYCLES.length - 1) {
    window.location.href = 'https://liveadaptiv.com';
    return;
  }

  if (!validateStep()) return;

  appState.currentStep++;
  renderStep();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevStep() {
  if (appState.currentStep > 0) {
    appState.currentStep--;
    document.getElementById('validation-banner').style.display = 'none';
    renderStep();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ════════════════════════════════════════════════════════════════════
// INIT — restore session position if returning user
// ════════════════════════════════════════════════════════════════════

// Check if already authenticated this browser session
window.addEventListener('DOMContentLoaded', () => {
  const token = sessionStorage.getItem('la_auth_token');
  if (token) {
    // Already authenticated — skip lock screen
    document.getElementById('lock-screen').style.display = 'none';
    const app = document.getElementById('main-app');
    app.classList.add('visible');
    renderStep();
  }
});
</script>
