<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Alchemist Field Guide | LiveAdaptiv</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b2945e; --stone: #fafaf9; --charcoal: #1c1917; }
        body { background-color: var(--stone); color: var(--charcoal); font-family: 'Inter', sans-serif; overscroll-behavior: none; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .blueprint-dot { background-image: radial-gradient(circle at 1px 1px, #e7e5e4 1px, transparent 0); background-size: 30px 30px; }
        
        /* --- SECURITY LOCK SCREEN --- */
        #enterprise-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999999; transition: opacity 0.5s ease;
        }
        .lock-container { background: #0f172a; border: 1px solid #1e293b; padding: 40px; border-radius: 16px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .lock-logo { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 32px; font-style: italic; margin-bottom: 15px; }
        .lock-title { color: white; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .lock-desc { color: #94a3b8; font-size: 12px; margin-bottom: 24px; line-height: 1.5; }
        .lock-input { width: 100%; padding: 14px; background: #020617; border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 16px; text-align: center; letter-spacing: 3px; font-family: monospace; font-size: 16px; outline: none; }
        .lock-input:focus { border-color: var(--gold); }
        .lock-btn { width: 100%; background: var(--gold); color: #020617; font-weight: bold; border: none; padding: 14px; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; transition: all 0.2s; }
        .lock-btn:hover { background: #d97706; color: white; }
        .lock-error { color: #f43f5e; font-size: 11px; margin-top: 12px; display: none; font-weight: bold; letter-spacing: 1px;}
        
        #main-app-content { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Component Styles */
        .glass-panel { background: rgba(28, 25, 23, 0.95); backdrop-filter: blur(16px); }
        .journal-input::-webkit-scrollbar { width: 4px; }
        .journal-input::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
        .slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(20px); } 100% { opacity: 1; transform: translateX(0); } }

        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--gold); cursor: pointer; margin-top: -10px; box-shadow: 0 0 10px rgba(178,148,94,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e7e5e4; border-radius: 2px; }
        input[type=range]:focus { outline: none; }
    </style>
</head>
<body class="blueprint-dot">

    <!-- SECURITY LOCK -->
    <div id="enterprise-lock">
        <div class="lock-container">
            <div class="lock-logo">A</div>
            <div class="lock-title">The Field Guide</div>
            <div class="lock-desc">Secured Clinical Protocol. Enter your access cipher.</div>
            <input type="password" id="cipher-input" class="lock-input" placeholder="ENTER CIPHER">
            <button onclick="unlockApp()" class="lock-btn">Authenticate</button>
            <div id="lock-error" class="lock-error">INVALID CIPHER. ACCESS DENIED.</div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app-content" class="min-h-screen flex flex-col">
        
        <!-- Navigation -->
        <nav class="p-5 flex justify-between items-center sticky top-0 z-50 bg-stone-50/90 backdrop-blur-md border-b border-stone-200">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border border-[#b2945e]/40 rounded-full flex items-center justify-center">
                    <span class="font-serif italic text-lg text-[#b2945e] pb-0.5">A</span>
                </div>
                <span class="text-[9px] font-bold uppercase tracking-[0.4em] text-stone-400">LiveAdaptiv</span>
            </div>
            <div class="text-[9px] font-bold uppercase tracking-widest text-[#b2945e]">The Alchemist Protocol</div>
        </nav>

        <main class="flex-1 max-w-3xl mx-auto w-full p-6 pb-32">
            
            <!-- Dynamic Content Area -->
            <div id="step-content" class="slide-in-right"></div>

            <!-- Progression Controls -->
            <div class="mt-12 pt-8 border-t border-stone-200 flex items-center justify-between">
                <button id="prev-btn" onclick="prevStep()" class="text-stone-400 hover:text-stone-900 font-serif italic text-lg transition-colors flex items-center gap-2 disabled:opacity-0 cursor-pointer">← Previous</button>
                <div class="h-1 flex-1 mx-4 bg-stone-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-[#b2945e] w-0 transition-all duration-500 shadow-[0_0_10px_rgba(178,148,94,0.5)]"></div>
                </div>
                <button id="next-btn" onclick="nextStep()" class="bg-stone-900 text-stone-50 px-8 py-3 rounded-full hover:bg-[#b2945e] hover:text-white transition-all font-sans text-xs font-bold tracking-[0.2em] uppercase shadow-lg transform hover:-translate-y-0.5">Next →</button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // --- SECURITY CIPHER ---
        const GUIDE_CIPHER = "GENESIS2026"; 

        function unlockApp() {
            const input = document.getElementById('cipher-input').value.trim().toUpperCase();
            if (input === GUIDE_CIPHER || input === "KINETIC2026") { 
                document.getElementById('enterprise-lock').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('enterprise-lock').style.display = 'none';
                    document.getElementById('main-app-content').style.display = 'flex';
                    renderStep(); 
                }, 500);
            } else {
                document.getElementById('lock-error').style.display = 'block';
                document.getElementById('cipher-input').value = '';
            }
        }
        document.getElementById('cipher-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') unlockApp();
        });

        // --- DATA & STATE ---
        let appState = {
            currentStep: 0,
            entries: {
                cycle1: { archetype: "", pre_friction: 5 }, // Default to middle
                cycle2: { sensation: "", message: "" },
                cycle3: { thought: "", reframe: "" },
                cycle4: { core_fear: "", sovereign_pivot: "" },
                cycle5: { stillness: "" },
                cycle6: { action: "", commitment: "", golden_shadow: "" },
                cycle7: { post_friction: 5 } // Default to middle
            }
        };

        function saveEntry(cycle, field, value) {
            appState.entries[cycle][field] = value;
        }

        function setArchetype(archName) {
            appState.entries.cycle1.archetype = archName;
            renderStep(); 
        }

        // Updates the number value next to the slider dynamically
        function updateSliderValue(sliderId, displayId, cycle, field) {
            const val = document.getElementById(sliderId).value;
            document.getElementById(displayId).innerText = val;
            saveEntry(cycle, field, parseInt(val));
            
            // If on the final page, instantly recalculate the Delta
            if(cycle === 'cycle7') {
                calculateDelta();
            }
        }

        // Calculates the mathematical difference between Pre and Post stress
        function calculateDelta() {
            const pre = appState.entries.cycle1.pre_friction;
            const post = appState.entries.cycle7.post_friction;
            const delta = post - pre;
            const display = document.getElementById('delta-display');
            
            if(display) {
                if(delta < 0) {
                    display.innerHTML = `<span class="text-green-500 font-bold">${delta} Points of Friction Metabolized</span>`;
                } else if (delta === 0) {
                    display.innerHTML = `<span class="text-stone-500 font-bold">Friction Baseline Maintained</span>`;
                } else {
                    display.innerHTML = `<span class="text-red-500 font-bold">+${delta} Friction Increased (Review Somatics)</span>`;
                }
            }
        }

        function getArchetypePrompt() {
            const arc = appState.entries.cycle1.archetype;
            if (!arc) return "I keep thinking that...";
            if (arc === "The Rusher") return "The Rusher says: 'There isn't enough time.' I keep thinking that...";
            if (arc === "The Freezer") return "The Freezer says: 'I can't handle this.' I keep thinking that...";
            if (arc === "The Fixer") return "The Fixer says: 'It's all on me.' I keep thinking that...";
            return "I keep thinking that...";
        }

        // --- THE 7 CYCLES (CONTENT MAP) ---
        const contentMap = [
            {
                id: 'intro',
                render: () => `
                    <div class="text-center space-y-8 mt-12">
                        <span class="text-xs font-bold tracking-[0.3em] uppercase text-[#b2945e] border border-[#b2945e] px-3 py-1 rounded-full">The Architecture</span>
                        <h2 class="text-4xl md:text-6xl font-serif italic text-stone-900 leading-none">The Seven<br>Cycles.</h2>
                        <div class="w-16 h-1 bg-[#b2945e] mx-auto"></div>
                        <p class="text-lg text-stone-600 font-serif leading-relaxed max-w-xl mx-auto">
                            You are not here to "fix" yourself. You are here to learn the mechanics of your own energy.
                        </p>
                        <div class="grid md:grid-cols-3 gap-4 text-left mt-12">
                            <div class="p-6 bg-white border border-stone-200 rounded-xl shadow-sm">
                                <div class="text-2xl mb-2">⚡</div>
                                <h3 class="font-bold text-xs uppercase tracking-widest mb-2">The Biometrics</h3>
                                <p class="text-sm text-stone-500">We do not assume stress. We measure it. Every cycle begins with a scan.</p>
                            </div>
                            <div class="p-6 bg-white border border-stone-200 rounded-xl shadow-sm">
                                <div class="text-2xl mb-2">⚖️</div>
                                <h3 class="font-bold text-xs uppercase tracking-widest mb-2">The Fork</h3>
                                <p class="text-sm text-stone-500">Stress hits the Body (Weight) or the Mind (Noise). Learn to treat them differently.</p>
                            </div>
                            <div class="p-6 bg-white border border-stone-200 rounded-xl shadow-sm">
                                <div class="text-2xl mb-2">🔥</div>
                                <h3 class="font-bold text-xs uppercase tracking-widest mb-2">The Alchemy</h3>
                                <p class="text-sm text-stone-500">We do not calm down. We transform friction into fuel for action.</p>
                            </div>
                        </div>
                    </div>`
            },
            {
                id: 'cycle1',
                render: () => {
                    const arch = appState.entries.cycle1.archetype;
                    const preVal = appState.entries.cycle1.pre_friction;
                    return `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-stone-300 pb-4">
                            <h2 class="text-5xl font-serif italic text-stone-900">The Anchor</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-2">Cycle 01</span>
                        </div>
                        <p class="font-serif text-xl text-stone-700 leading-relaxed">
                            The first step in alchemy is locating the material. How does your stress manifest today?
                        </p>
                        
                        <!-- THE ENTRY SLIDER -->
                        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-stone-900">Friction Baseline</h3>
                                    <p class="text-[10px] text-stone-500 uppercase tracking-widest mt-1">Quantify current state</p>
                                </div>
                                <div class="text-3xl font-serif italic text-[#b2945e]" id="pre-val-display">${preVal}</div>
                            </div>
                            <input type="range" id="pre-slider" min="1" max="10" value="${preVal}" class="w-full" oninput="updateSliderValue('pre-slider', 'pre-val-display', 'cycle1', 'pre_friction')">
                            <div class="flex justify-between text-[10px] uppercase font-bold text-stone-400 mt-2">
                                <span>1 (Flow)</span>
                                <span>10 (Overload)</span>
                            </div>
                        </div>

                        <!-- ARCHETYPE SELECTOR -->
                        <div class="bg-stone-50 p-6 rounded-xl border border-stone-200">
                            <p class="text-xs font-bold uppercase tracking-widest text-stone-500 mb-4">Select Your Archetype (Required)</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                <button onclick="setArchetype('The Rusher')" class="p-4 bg-white border rounded-lg transition-all text-left ${arch === 'The Rusher' ? 'border-[#b2945e] bg-[#b2945e]/10 ring-1 ring-[#b2945e]' : 'border-stone-200 hover:border-stone-400'}">
                                    <span class="block font-bold text-stone-900 mb-1">The Rusher</span>
                                    <span class="text-xs text-stone-500">"I don't have time." Anxiety, speed.</span>
                                </button>
                                <button onclick="setArchetype('The Freezer')" class="p-4 bg-white border rounded-lg transition-all text-left ${arch === 'The Freezer' ? 'border-[#b2945e] bg-[#b2945e]/10 ring-1 ring-[#b2945e]' : 'border-stone-200 hover:border-stone-400'}">
                                    <span class="block font-bold text-stone-900 mb-1">The Freezer</span>
                                    <span class="text-xs text-stone-500">"I'm overwhelmed." Paralysis, fog.</span>
                                </button>
                                <button onclick="setArchetype('The Fixer')" class="p-4 bg-white border rounded-lg transition-all text-left ${arch === 'The Fixer' ? 'border-[#b2945e] bg-[#b2945e]/10 ring-1 ring-[#b2945e]' : 'border-stone-200 hover:border-stone-400'}">
                                    <span class="block font-bold text-stone-900 mb-1">The Fixer</span>
                                    <span class="text-xs text-stone-500">"It's all on me." Burden, tension.</span>
                                </button>
                            </div>
                        </div>
                    </div>`
                }
            },
            {
                id: 'cycle2',
                render: () => `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-stone-300 pb-4">
                            <h2 class="text-5xl font-serif italic text-stone-900">The Body</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-2">Cycle 02</span>
                        </div>
                        <p class="font-serif text-xl text-stone-700 leading-relaxed">
                            Before the mind spins a story, the body sounds an alarm. Where is the physical friction located right now?
                        </p>
                        <div class="space-y-6">
                            <div>
                                <label class="font-sans text-xs font-bold uppercase tracking-widest text-stone-400 block mb-2">The Somatic Map</label>
                                <textarea oninput="saveEntry('cycle2', 'sensation', this.value)" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-4 focus:border-[#b2945e] outline-none h-24 resize-none text-stone-700 font-serif italic text-lg" placeholder="e.g., My chest feels tight and my jaw is locked...">${appState.entries.cycle2.sensation}</textarea>
                            </div>
                        </div>
                    </div>`
            },
            {
                id: 'cycle3',
                render: () => `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-stone-300 pb-4">
                            <h2 class="text-5xl font-serif italic text-stone-900">The Mind</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-2">Cycle 03</span>
                        </div>
                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="p-6 border border-stone-200 rounded-xl bg-stone-50">
                                <label class="font-sans text-xs font-bold uppercase tracking-widest text-stone-400 block mb-2">The Loop (Fiction)</label>
                                <p class="text-xs text-[#b2945e] mb-2 font-bold uppercase tracking-widest">Archetype: ${appState.entries.cycle1.archetype || "None Selected"}</p>
                                <textarea oninput="saveEntry('cycle3', 'thought', this.value)" class="w-full bg-transparent border-b border-stone-200 focus:border-stone-900 outline-none h-32 resize-none text-stone-600 font-serif text-lg italic mt-2" placeholder="${getArchetypePrompt()}">${appState.entries.cycle3.thought}</textarea>
                            </div>
                            <div class="p-6 bg-stone-900 rounded-xl text-stone-300">
                                <label class="font-sans text-xs font-bold uppercase tracking-widest text-[#b2945e] block">The Fact (Data)</label>
                                <textarea oninput="saveEntry('cycle3', 'reframe', this.value)" class="w-full bg-transparent border-b border-stone-700 focus:border-[#b2945e] outline-none h-32 resize-none text-white font-serif text-lg mt-2" placeholder="The absolute objective truth is...">${appState.entries.cycle3.reframe}</textarea>
                            </div>
                        </div>
                    </div>`
            },
            {
                id: 'cycle4',
                render: () => `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-stone-300 pb-4">
                            <h2 class="text-5xl font-serif italic text-stone-900">The Pivot</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-2">Cycle 04</span>
                        </div>
                        <div class="space-y-8 pt-2">
                            <p class="font-serif text-lg text-stone-600 leading-relaxed">
                                The Pivot is the exact moment you stop managing the symptom and address the root cause. You have identified the physical sensation and the mental loop. Now, we challenge the foundation.
                            </p>
                            <div>
                                <label class="font-serif text-xl text-stone-800 block mb-2">What is the core fear or assumption driving this friction?</label>
                                <div class="p-4 bg-stone-100 rounded-lg italic text-stone-600">
                                    <input type="text" oninput="saveEntry('cycle4', 'core_fear', this.value)" value="${appState.entries.cycle4.core_fear}" class="bg-transparent w-full outline-none" placeholder="e.g., I am afraid that if I fail this, I lose my status...">
                                </div>
                            </div>
                            <div>
                                <label class="font-serif text-xl text-stone-800 block mb-2">The Sovereign Pivot</label>
                                <p class="text-xs uppercase tracking-widest text-stone-400 font-bold mb-2">What is the highest-leverage action you can take right now despite that fear?</p>
                                <textarea oninput="saveEntry('cycle4', 'sovereign_pivot', this.value)" class="w-full bg-transparent border-b border-stone-300 focus:border-[#b2945e] focus:outline-none min-h-[80px] journal-input resize-none text-stone-700 font-serif text-lg italic" placeholder="e.g., I will send the email outlining the risk, because my status is built on honesty, not perfection...">${appState.entries.cycle4.sovereign_pivot}</textarea>
                            </div>
                        </div>
                    </div>`
            },
            {
                id: 'cycle5',
                render: () => `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-stone-300 pb-4">
                            <h2 class="text-5xl font-serif italic text-stone-900">The Void</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-2">Cycle 05</span>
                        </div>
                        <div class="flex justify-center py-8">
                            <div class="w-32 h-32 rounded-full border-2 border-stone-200 flex items-center justify-center animate-pulse">
                                <div class="w-24 h-24 rounded-full bg-stone-100 flex items-center justify-center">
                                    <span class="font-serif italic text-stone-400">Stillness</span>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="font-serif text-xl text-stone-800 block mb-2">In the silence, what became clear?</label>
                            <textarea oninput="saveEntry('cycle5', 'stillness', this.value)" class="w-full bg-transparent border-b border-stone-300 focus:border-[#b2945e] focus:outline-none min-h-[100px] journal-input resize-none text-stone-700 font-serif text-lg italic" placeholder="...">${appState.entries.cycle5.stillness}</textarea>
                        </div>
                    </div>`
            },
            {
                id: 'cycle6',
                render: () => `
                    <div class="space-y-12 mt-6">
                        <div class="border-b border-stone-300 pb-4">
                            <h2 class="text-5xl font-serif italic text-stone-900">The Output</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-2">Cycle 06</span>
                        </div>
                        
                        <!-- THE GOLDEN SHADOW -->
                        <div class="bg-stone-900 text-stone-200 p-8 rounded-xl border border-stone-800 relative overflow-hidden">
                            <div class="absolute -top-10 -right-10 w-40 h-40 bg-[#b2945e] rounded-full blur-[60px] opacity-20"></div>
                            <h3 class="font-serif text-2xl text-white italic mb-2 relative z-10">The Golden Shadow</h3>
                            <p class="text-sm text-stone-400 mb-6 relative z-10 max-w-lg">The Saboteur holds your fears. The Golden Shadow holds your unlived greatness. The traits you admire in others are merely your own latent potential waiting to be claimed.</p>
                            <label class="text-xs font-bold uppercase tracking-widest text-[#b2945e] block mb-2 relative z-10">Who is your hero, and what trait do they have that you "lack"?</label>
                            <textarea oninput="saveEntry('cycle6', 'golden_shadow', this.value)" class="w-full bg-stone-800/50 border-b border-stone-600 text-white font-serif text-lg italic p-2 focus:outline-none focus:border-[#b2945e] rounded relative z-10" placeholder="I admire [Name] because they are [Trait]. This trait lives in me as...">${appState.entries.cycle6.golden_shadow}</textarea>
                        </div>

                        <!-- THE CONTRACT -->
                        <div class="bg-[#b2945e]/10 border border-[#b2945e]/30 p-8 rounded-xl relative overflow-hidden">
                            <label class="font-sans text-xs font-bold uppercase tracking-widest text-stone-800 block mb-4">The Contract</label>
                            <div class="space-y-6">
                                <div>
                                    <span class="font-serif text-2xl text-stone-800">I solemnly commit to</span>
                                    <input type="text" oninput="saveEntry('cycle6', 'action', this.value)" value="${appState.entries.cycle6.action}" class="bg-transparent border-b-2 border-stone-800 w-full font-serif text-2xl text-stone-900 focus:outline-none focus:border-[#b2945e] p-1 mt-2" placeholder="take this action...">
                                </div>
                                <div>
                                    <span class="font-serif text-2xl text-stone-800">by</span>
                                    <input type="text" oninput="saveEntry('cycle6', 'commitment', this.value)" value="${appState.entries.cycle6.commitment}" class="bg-transparent border-b-2 border-stone-800 w-full font-serif text-2xl text-stone-900 focus:outline-none focus:border-[#b2945e] p-1 mt-2" placeholder="tomorrow at...">
                                </div>
                            </div>
                        </div>
                    </div>`
            },
            {
                id: 'cycle7',
                render: () => {
                    const e = appState.entries;
                    const preVal = e.cycle1.pre_friction;
                    const postVal = e.cycle7.post_friction;
                    
                    // Determine initial delta text (though calculateDelta will override this instantly on load)
                    let deltaText = "Calculate Shift";

                    return `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-stone-300 pb-4">
                            <h2 class="text-5xl font-serif italic text-stone-900">Pattern Rec</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-2">Cycle 07</span>
                        </div>
                        <p class="font-serif text-xl text-stone-700 leading-relaxed">
                            You have shifted your baseline. Let's quantify the alchemy.
                        </p>
                        
                        <!-- THE EXIT SLIDER & METRICS -->
                        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm mb-8">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-stone-900">Post-Protocol Audit</h3>
                                    <p class="text-[10px] text-stone-500 uppercase tracking-widest mt-1">Re-evaluate your friction state</p>
                                </div>
                                <div class="text-3xl font-serif italic text-[#b2945e]" id="post-val-display">${postVal}</div>
                            </div>
                            <input type="range" id="post-slider" min="1" max="10" value="${postVal}" class="w-full mb-6" oninput="updateSliderValue('post-slider', 'post-val-display', 'cycle7', 'post_friction')">
                            
                            <div class="pt-4 border-t border-stone-100 flex justify-between items-center">
                                <span class="text-[10px] uppercase font-bold text-stone-400 tracking-widest">Entry Baseline: ${preVal}</span>
                                <div id="delta-display" class="text-sm font-sans uppercase tracking-widest">
                                    <!-- Populated by JS -->
                                </div>
                            </div>
                        </div>

                        <!-- FINAL DATA STREAM -->
                        <div class="bg-stone-900 text-stone-50 p-8 rounded-2xl shadow-2xl relative overflow-hidden">
                            <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-[#b2945e] mb-6 relative z-10">Your Execution Blueprint</h3>
                            
                            <div class="space-y-4 font-serif text-lg">
                                <p><strong class="font-sans text-xs uppercase tracking-widest text-stone-500 mr-2">Archetype:</strong> ${e.cycle1.archetype || '<span class="italic text-stone-500">None selected</span>'}</p>
                                <p><strong class="font-sans text-xs uppercase tracking-widest text-stone-500 mr-2">Core Fear:</strong> ${e.cycle4.core_fear || '<span class="italic text-stone-500">Unanswered</span>'}</p>
                                <p><strong class="font-sans text-xs uppercase tracking-widest text-stone-500 mr-2">The Pivot:</strong> ${e.cycle4.sovereign_pivot || '<span class="italic text-stone-500">Unanswered</span>'}</p>
                                <p><strong class="font-sans text-xs uppercase tracking-widest text-[#b2945e] mr-2 block mt-6 mb-2">Final Directive:</strong></p>
                                <p class="italic text-white bg-stone-800 p-4 rounded-lg">"I commit to ${e.cycle6.action || '___'} by ${e.cycle6.commitment || '___'}."</p>
                            </div>
                        </div>
                    </div>`
                }
            }
        ];

        // --- NAVIGATION ENGINE ---
        function renderStep() {
            const step = contentMap[appState.currentStep];
            
            const contentDiv = document.getElementById('step-content');
            contentDiv.classList.remove('slide-in-right');
            void contentDiv.offsetWidth; 
            contentDiv.innerHTML = step.render();
            contentDiv.classList.add('slide-in-right');

            // Trigger Delta Calculation immediately if on final page
            if (appState.currentStep === contentMap.length - 1) {
                calculateDelta();
            }

            const progress = (appState.currentStep / (contentMap.length - 1)) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = appState.currentStep === 0;
            
            if (appState.currentStep === 1 && !appState.entries.cycle1.archetype) {
                nextBtn.disabled = true;
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                nextBtn.innerText = "Select Archetype ->";
            } else {
                nextBtn.disabled = false;
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                
                if (appState.currentStep === contentMap.length - 1) {
                    nextBtn.innerHTML = "Return to Hub";
                } else {
                    nextBtn.innerHTML = "Next →";
                }
            }
            lucide.createIcons();
        }

        function nextStep() {
            if (appState.currentStep === contentMap.length - 1) {
                window.location.href = "https://liveadaptiv.com"; 
                return;
            }
            
            if (appState.currentStep === 1 && !appState.entries.cycle1.archetype) {
                alert("Please select an Archetype to proceed.");
                return;
            }

            appState.currentStep++;
            renderStep();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prevStep() {
            if (appState.currentStep > 0) {
                appState.currentStep--;
                renderStep();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
